<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .nav-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
        }
        .nav-button {
            background-color: #008CBA;
            border: none;
            color: white;
            padding: 15px 20px;
            text-align: center;
            text-decoration: none;
            display: block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            max-width: 200px;
        }
        @media (min-width: 600px) {
            .nav-buttons {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="nav-buttons">
        <a href="#" class="nav-button">Home</a>
        <a href="#" class="nav-button">About</a>
        <a href="#" class="nav-button">Services</a>
        <a href="#" class="nav-button">Contact</a>
    </div>
</body>
</html>
